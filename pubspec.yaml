name: h_smart
description: >
  H-Smart: Professional HVAC Monitoring and Smart Building Management System.
  A premium mobile application with dark mode UI, real-time Firebase integration,
  and professional industrial dashboard appearance.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  riverpod_generator: ^2.3.0
  
  # UI & Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  glassmorphism: ^3.0.0
  shimmer: ^3.0.0
  
  # Charts & Graphs
  fl_chart: ^0.63.0
  syncfusion_flutter_charts: ^23.2.36
  
  # Date & Time
  intl: ^0.19.0
  timezone: ^0.9.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  
  # Notifications
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^16.1.0
  
  # Utilities
  http: ^1.1.0
  dio: ^5.3.0
  connectivity_plus: ^5.0.0
  device_info_plus: ^9.1.0
  permission_handler: ^11.4.4
  
  # Animation & Motion
  lottie: ^2.4.0
  animated_widgets: ^0.2.5
  page_transition: ^2.1.0
  
  # Localization
  easy_localization: ^3.0.2
  
  # Logging & Debugging
  logger: ^2.1.0
  sentry_flutter: ^7.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/localization/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/RobotoMono-Bold.ttf
          weight: 700
