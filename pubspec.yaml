name: h_smart
description: H-Smart HVAC Monitoring & Building Management System

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.13.0
  firebase_messaging: ^14.6.0
  firebase_analytics: ^10.7.0
  
  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  
  # HTTP & Networking
  dio: ^5.3.0
  http: ^1.1.0
  
  # UI & Design
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0
  lottie: ^2.4.0
  intl: ^0.19.0
  
  # Charts & Analytics
  fl_chart: ^0.65.0
  charts_flutter: ^0.12.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0
  
  # Utilities
  uuid: ^4.0.0
  connectivity_plus: ^5.0.0
  geolocator: ^9.0.2
  
  # Logging
  logger: ^2.0.0
  
  # Date & Time
  timezone: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
