name: h_smart
description: H-Smart - Professional HVAC Building Management System
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.2.0
  firebase_messaging: ^14.6.0
  provider: ^6.0.0
  intl: ^0.19.0
  fl_chart: ^0.65.0
  google_maps_flutter: ^2.4.0
  permission_handler: ^11.4.0
  shared_preferences: ^2.2.0
  connectivity_plus: ^5.0.0
  lottie: ^2.4.0
  cached_network_image: ^3.3.0
  equatable: ^2.0.5
  get: ^4.6.5
  dio: ^5.3.0
  logger: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed_annotation: ^2.4.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Light.ttf
          weight: 300
